name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  ORT_VERSION: "1.24.4"

jobs:
  lint:
    name: fmt & clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure workspace root for standalone build
        shell: bash
        run: |
          if ! grep -q '^\[workspace\]' Cargo.toml; then
            cat >> Cargo.toml << 'TOKIMO_WORKSPACE'
          [workspace]
          members = ["."]
          
          [workspace.lints.rust]
          unsafe_code     = "warn"
          unused_must_use = "deny"
          
          [workspace.lints.clippy]
          all      = { level = "warn", priority = -1 }
          pedantic = "allow"
          lint_groups_priority = "allow"
          wildcard_imports        = "allow"
          module_name_repetitions = "allow"
          must_use_candidate      = "allow"
          missing_errors_doc      = "allow"
          missing_panics_doc      = "allow"
          items_after_statements  = "allow"
          struct_excessive_bools  = "allow"
          similar_names           = "allow"
          many_single_char_names  = "allow"
          unnecessary_literal_bound = "allow"
          doc_markdown            = "allow"
          ref_option              = "allow"
          fn_params_excessive_bools = "allow"
          needless_pass_by_value  = "allow"
          cast_possible_wrap      = "allow"
          cast_possible_truncation = "allow"
          cast_precision_loss     = "allow"
          cast_sign_loss          = "allow"
          cast_lossless           = "allow"
          too_many_lines          = "allow"
          map_unwrap_or           = "allow"
          unused_async            = "allow"
          redundant_closure_for_method_calls = "allow"
          default_trait_access    = "allow"
          return_self_not_must_use = "allow"
          case_sensitive_file_extension_comparisons = "allow"
          TOKIMO_WORKSPACE
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure workspace root for standalone build
        shell: bash
        run: |
          if ! grep -q '^\[workspace\]' Cargo.toml; then
            cat >> Cargo.toml << 'TOKIMO_WORKSPACE'
          [workspace]
          members = ["."]
          
          [workspace.lints.rust]
          unsafe_code     = "warn"
          unused_must_use = "deny"
          
          [workspace.lints.clippy]
          all      = { level = "warn", priority = -1 }
          pedantic = "allow"
          lint_groups_priority = "allow"
          wildcard_imports        = "allow"
          module_name_repetitions = "allow"
          must_use_candidate      = "allow"
          missing_errors_doc      = "allow"
          missing_panics_doc      = "allow"
          items_after_statements  = "allow"
          struct_excessive_bools  = "allow"
          similar_names           = "allow"
          many_single_char_names  = "allow"
          unnecessary_literal_bound = "allow"
          doc_markdown            = "allow"
          ref_option              = "allow"
          fn_params_excessive_bools = "allow"
          needless_pass_by_value  = "allow"
          cast_possible_wrap      = "allow"
          cast_possible_truncation = "allow"
          cast_precision_loss     = "allow"
          cast_sign_loss          = "allow"
          cast_lossless           = "allow"
          too_many_lines          = "allow"
          map_unwrap_or           = "allow"
          unused_async            = "allow"
          redundant_closure_for_method_calls = "allow"
          default_trait_access    = "allow"
          return_self_not_must_use = "allow"
          case_sensitive_file_extension_comparisons = "allow"
          TOKIMO_WORKSPACE
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Download ONNX Runtime
        shell: bash
        run: |
          mkdir -p bin/onnxruntime/current
          curl -sL "https://github.com/microsoft/onnxruntime/releases/download/v${{ env.ORT_VERSION }}/onnxruntime-linux-x64-${{ env.ORT_VERSION }}.tgz" | tar -xzf - -C bin/onnxruntime/current --strip-components=1
          echo "ORT_DYLIB_PATH=${{ github.workspace }}/bin/onnxruntime/current/lib/libonnxruntime.so" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${{ github.workspace }}/bin/onnxruntime/current/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: cargo test
        run: cargo test
